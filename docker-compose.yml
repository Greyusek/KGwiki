services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kgwiki-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kgwiki?schema=public
      NEXTAUTH_URL: http://localhost
    expose:
      - "3000"
    depends_on:
      - db
      - minio

  nginx:
    image: nginx:1.27-alpine
    container_name: kgwiki-nginx
    restart: unless-stopped
    depends_on:
      - app
      - minio
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:16-alpine
    container_name: kgwiki-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kgwiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: kgwiki-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
